<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venta Totalizador</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 30px;
      }

      .contenedor {
        max-width: 700px;
        margin: 0 auto;
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
        text-align: center;
        color: #1f2937;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }

      td {
        padding: 10px 8px;
        vertical-align: middle;
      }

      label {
        font-weight: bold;
        color: #374151;
      }

      input[type="number"],
      select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 14px;
      }

      input[type="submit"] {
        background-color: #2563eb;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }

      input[type="submit"]:hover {
        background-color: #1d4ed8;
      }

      .resultado {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 16px;
      }

      .resultado p {
        margin: 8px 0;
        color: #111827;
      }

      .destacado {
        font-weight: bold;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <h1>Venta Totalizador</h1>

      <form id="totalizar-form">
        <table>
          <tr>
            <td><label for="cantidad-items">Cantidad de item</label></td>
            <td><input type="number" id="cantidad-items" /></td>
          </tr>

          <tr>
            <td><label for="precio-item">Precio por item</label></td>
            <td><input type="number" id="precio-item" step="0.01" /></td>
          </tr>

          <tr>
            <td><label for="codigo-estado">Código de estado</label></td>
            <td>
              <select id="codigo-estado">
                <option value="CA" selected>CA (California)</option>
                <option value="AL">AL (Alabama)</option>
                <option value="NV">NV (Nevada)</option>
                <option value="UT">UT (Utah)</option>
                <option value="TX">TX (Texas)</option>
              </select>
            </td>
          </tr>

          <tr>
            <td><label for="categoria-producto">Categoría</label></td>
            <td>
              <select id="categoria-producto">
                <option value="Varios" selected>Varios</option>
                <option value="Alimentos">Alimentos</option>
                <option value="Bebidas alcohólicas">Bebidas alcohólicas</option>
                <option value="Material de escritorio">Material de escritorio</option>
                <option value="Muebles">Muebles</option>
                <option value="Electrónicos">Electrónicos</option>
                <option value="Vestimenta">Vestimenta</option>
              </select>
            </td>
          </tr>

          <tr>
            <td><label for="peso-volumetrico">Peso volumétrico (kg)</label></td>
            <td><input type="number" id="peso-volumetrico" step="0.1" /></td>
          </tr>

          <tr>
            <td></td>
            <td><input type="submit" value="Totalizar" id="totalizar-button" /></td>
          </tr>
        </table>
      </form>

      <div id="resultado-div" class="resultado"></div>
    </div>

    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
