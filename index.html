<h1>Venta Totalizador</h1>

<form id="totalizar-form">
  <table>
    <tr>
      <td><label for="cantidad-items">Cantidad de item</label></td>
      <td><input type="number" id="cantidad-items" /></td>
      <td></td>
    </tr>

    <tr>
      <td><label for="precio-item">Precio por item</label></td>
      <td><input type="number" id="precio-item" step="0.01" /></td>
      <td></td>
    </tr>

    <tr>
      <td><label for="codigo-estado">Codigo de estado</label></td>
      <td><input type="text" id="codigo-estado" /></td>
      <td><input type="submit" value="Totalizar" id="totalizar-button" /></td>
    </tr>
  </table>
</form>

<div id="resultado-div"></div>

<script type="module" src="./src/presenter.js"></script>
